repos:
  - repo: local
    hooks:
      - id: ruff check
        name: ruff check
        entry: ./scripts/pre-commit/ruff-check.sh
        require_serial: true
        language: system
        types_or: [python, pyi, jupyter]
      - id: ruff format
        name: ruff format
        entry: ./scripts/pre-commit/ruff-format.sh
        require_serial: true
        language: system
        types_or: [python, pyi, jupyter]
      - id: pytest
        name: pytest
        entry: ./scripts/pre-commit/pytest.sh
        require_serial: true
        language: system
        pass_filenames: false
        types_or: [python, pyi, jupyter]
      - id: mypy
        name: mypy
        entry: ./scripts/pre-commit/mypy.sh
        require_serial: true
        language: system
        types_or: [python, pyi, jupyter]
