name: ${REPO_ROOT_BASENAME:-$REPO_NAME}

x-app-common: &app_common
  build:
    context: ..
    dockerfile: docker/Dockerfile
    args:
      REPO_NAME: ${REPO_NAME}
      USER_NAME: ${USER_NAME:-kujira}
      GROUP_NAME: ${GROUP_NAME:-kujira}
      USER_UID: ${USER_UID:-1000}
      USER_GID: ${USER_GID:-1000}
  image: ghcr.io/${GITHUB_REPOSITORY}:latest
  volumes:
    - .bash_history:/home/kujira/.bash_history
    - ../:/home/kujira/workspace/${REPO_NAME:?REPO_NAME is required}
  tty: true
  stdin_open: true
  network_mode: "host"
  working_dir: /home/kujira/workspace/${REPO_NAME:?REPO_NAME is required}
  command: ["bash"]

services:

  app:
    <<: *app_common

  app-gpu:
    <<: *app_common
    profiles: ["gpu"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
