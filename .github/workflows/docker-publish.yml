name: Publish Docker image

on:
  push:
    branches:
      - main
    paths:
      - docker/Dockerfile
      - docker/docker-compose.yml
      - docker/entrypoint.sh
      - .dockerignore
      - pyproject.toml
      - uv.lock
      - .github/workflows/docker-publish.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and push development image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve image name
        id: image
        shell: bash
        run: |
          set -euo pipefail

          github_repository_lc="${GITHUB_REPOSITORY,,}"
          repository_name="${github_repository_lc##*/}"

          echo "GITHUB_REPOSITORY=${github_repository_lc}" >> "$GITHUB_ENV"
          echo "REPO_NAME=${repository_name}" >> "$GITHUB_ENV"
          echo "REPO_ROOT_BASENAME=${repository_name}" >> "$GITHUB_ENV"

          image_name="$(
            GITHUB_REPOSITORY="${github_repository_lc}" \
            REPO_NAME="${repository_name}" \
            REPO_ROOT_BASENAME="${repository_name}" \
            docker compose -f docker/docker-compose.yml config --format json \
              | jq -r '.services.app.image'
          )"

          if [[ -z "$image_name" || "$image_name" == "null" ]]; then
            echo "Failed to resolve services.app.image from docker/docker-compose.yml" >&2
            exit 1
          fi

          image_repo="${image_name%:*}"

          echo "image_name=${image_name}" >> "$GITHUB_OUTPUT"
          echo "sha_image=${image_repo}:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

          echo "Image name: ${image_name}"
          echo "SHA image: ${image_repo}:sha-${GITHUB_SHA}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push development image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image_name }}
            ${{ steps.image.outputs.sha_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
