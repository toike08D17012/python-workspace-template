name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Lint, type check, and test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve image names
        id: image
        shell: bash
        run: |
          set -euo pipefail

          github_repository_lc="${GITHUB_REPOSITORY,,}"
          repository_name="${github_repository_lc##*/}"

          dev_image="$(
            GITHUB_REPOSITORY="${github_repository_lc}" \
            REPO_NAME="${repository_name}" \
            REPO_ROOT_BASENAME="${repository_name}" \
            docker compose -f docker/docker-compose.yml config --format json \
              | jq -r '.services.app.image'
          )"

          if [[ -z "$dev_image" || "$dev_image" == "null" ]]; then
            echo "Failed to resolve services.app.image from docker/docker-compose.yml" >&2
            exit 1
          fi

          echo "repository_name=${repository_name}" >> "$GITHUB_OUTPUT"
          echo "dev_image=${dev_image}" >> "$GITHUB_OUTPUT"
          echo "local_dev_image=local/${repository_name}:dev" >> "$GITHUB_OUTPUT"

          echo "Development image: ${dev_image}"
          echo "Local image: local/${repository_name}:dev"

      - name: Detect environment-related changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          event_name="${{ github.event_name }}"

          if [[ "$event_name" == "workflow_dispatch" ]]; then
            echo "Manual workflow run: building the development image"
            echo "env_related=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$event_name" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"

            echo "Comparing pull request commits:"
            echo "  Base: $base"
            echo "  Head: $head"

            changed_files="$(git diff --name-only "${base}...${head}")"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            forced="${{ github.event.forced }}"

            echo "Comparing push commits:"
            echo "  Base:   $base"
            echo "  Head:   $head"
            echo "  Forced: $forced"

            if [[ "$forced" == "true" ]]; then
              echo "Force push detected: rebuilding the development image"
              echo "env_related=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if [[ "$base" == "0000000000000000000000000000000000000000" ]]; then
              echo "New branch history detected: comparing against the empty tree"
              empty_tree="$(git hash-object -t tree /dev/null)"
              changed_files="$(git diff --name-only "$empty_tree" "$head")"
            elif ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
              echo "Base commit is not available locally: $base"
              echo "Falling back to rebuilding the development image"
              echo "env_related=true" >> "$GITHUB_OUTPUT"
              exit 0
            else
              changed_files="$(git diff --name-only "$base" "$head")"
            fi
          fi

          echo "Changed files:"
          printf '%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" \
            | grep -E '^(Dockerfile|\.dockerignore|docker/.*|compose\.ya?ml|docker-compose\.ya?ml|devcontainer\.json|\.devcontainer/.*|pyproject\.toml|uv\.lock|requirements.*\.txt)$' \
            > /dev/null; then
            echo "Environment-related changes detected"
            echo "env_related=true" >> "$GITHUB_OUTPUT"
          else
            echo "No environment-related changes detected"
            echo "env_related=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        if: steps.changes.outputs.env_related == 'false'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull development image
        if: steps.changes.outputs.env_related == 'false'
        run: |
          docker pull "${{ steps.image.outputs.dev_image }}"
          docker tag \
            "${{ steps.image.outputs.dev_image }}" \
            "${{ steps.image.outputs.local_dev_image }}"

      - name: Set up Docker Buildx
        if: steps.changes.outputs.env_related == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Build development image for this change
        if: steps.changes.outputs.env_related == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile
          load: true
          build-args: |
            REPO_NAME=${{ steps.image.outputs.repository_name }}
            USER_NAME=kujira
            GROUP_NAME=kujira
            USER_UID=1000
            USER_GID=1000
          tags: ${{ steps.image.outputs.local_dev_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Ruff check
        run: |
          docker run --rm \
            --entrypoint "" \
            --user root \
            -e HOME=/tmp \
            -e XDG_CACHE_HOME=/tmp/.cache \
            -e RUFF_CACHE_DIR=/tmp/ruff-cache \
            -v "$PWD:/workspace" \
            -w /workspace \
            "${{ steps.image.outputs.local_dev_image }}" \
            uv run --locked ruff check

      - name: Ruff format check
        run: |
          docker run --rm \
            --entrypoint "" \
            --user root \
            -e HOME=/tmp \
            -e XDG_CACHE_HOME=/tmp/.cache \
            -e RUFF_CACHE_DIR=/tmp/ruff-cache \
            -v "$PWD:/workspace" \
            -w /workspace \
            "${{ steps.image.outputs.local_dev_image }}" \
            uv run --locked ruff format --check

      - name: Mypy
        run: |
          docker run --rm \
            --entrypoint "" \
            --user root \
            -e HOME=/tmp \
            -e XDG_CACHE_HOME=/tmp/.cache \
            -e MYPY_CACHE_DIR=/tmp/mypy-cache \
            -v "$PWD:/workspace" \
            -w /workspace \
            "${{ steps.image.outputs.local_dev_image }}" \
            uv run --locked mypy

      - name: Pytest
        run: |
          docker run --rm \
            --entrypoint "" \
            --user root \
            -e HOME=/tmp \
            -e XDG_CACHE_HOME=/tmp/.cache \
            -v "$PWD:/workspace" \
            -w /workspace \
            "${{ steps.image.outputs.local_dev_image }}" \
            uv run --locked pytest -o cache_dir=/tmp/pytest-cache
